{% extends "main/base.html" %}
{% load static %}
{% block content %}
<div class="container mt-4">
    <h2>Тепловая карта</h2>
    <div class="row shadow-sm border-0 p-3 mb-4">
        <form id="filter-form" method="GET" class="row g-3 align-items-center">
            <div class="col-auto">
                <label for="currencySelect" class="col-form-label">Выберите валюты для создания тепловой карты:</label>
            </div>
            <div class="mb-2">
                <button type="button" class="btn btn-sm btn-outline-secondary" id="selectAll">Выбрать всё</button>
                <button type="button" class="btn btn-sm btn-outline-secondary" id="deselectAll">Снять всё</button>
            </div>
            <div style="max-height: 250px; overflow-y: auto; border: 1px solid #324558; padding: 15px; border-radius: 8px;">
                <div class="row">
                    {% for item in currencies %}
                        <div class="col-md-3 col-6 mb-2">
                            <div class="form-check">
                                <input class="form-check-input currency-checkbox" type="checkbox" name="currencies" value="{{ item.letter_code }}" id="check_{{ item.letter_code }}">
                                <label class="form-check-label" style="font-size: 0.85rem;" for="check_{{ item.letter_code }}">
                                    <strong>{{ item.letter_code }}</strong> <br>
                                    <small class="text-muted">{{ item.currency }}</small>
                                </label>
                            </div>
                        </div>
                    {% endfor %}
                </div>
            </div>
            <div class="d-flex align-items-center gap-3 mt-3">
                <button type="submit" class="btn btn-primary">Построить тепловую карту</button>
    
                <div class="form-check form-switch mb-0">
                    <input class="form-check-input" type="checkbox" name="mask" id="maskSwitch" {% if mask == 'on' %}checked{% endif %}>
                    <label class="form-check-label" for="maskSwitch">Скрыть зеркальные значения</label>
                </div>
            </div>
    <div class="container shadow-sm border-0 p-3" id="chart-container">
        {{ chart|safe }}
    </div>
</div>
<script src="{% static 'js/charts.js' %}"></script>
<script>
    initFilterForm('filter-form');
    const selectAllBtn = document.getElementById('selectAll');
    const deselectAllBtn = document.getElementById('deselectAll');
    const checkboxes = document.querySelectorAll('.currency-checkbox');
    function toggleAll(state) {
        checkboxes.forEach(cb => {
            cb.checked = state;
        });
        // После того как всё выбрали/сняли, обновляем график
        sendData(document.getElementById('filter-form'));
    }
    selectAllBtn.addEventListener('click', () => toggleAll(true));
    deselectAllBtn.addEventListener('click', () => toggleAll(false));
</script>
{% endblock %}
