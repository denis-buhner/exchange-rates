{% extends "main/base.html" %}
{% block content %}
<style>
    /* Центрируем содержимое по вертикали и горизонтали */
    .main-wrapper {
        min-height: 80vh; /* Занимает 80% высоты экрана */
        display: flex;
        flex-direction: column;
        justify-content: center; /* Центр по вертикали */
        align-items: center;
        border-radius: 15px;     /* Центр по горизонтали */
    }
    .menu-card {
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        border-radius: 15px; /* Немного скруглим углы для современности */
    }
</style>
<div class="container main-wrapper border">
    <h2 class="mb-5 text-center">Анализ курсов валют</h2>
    <div class="row justify-content-center g-4 w-100">
        <div class="col-md-4 col-sm-6">
            <div class="card h-100 menu-card shadow border text-center p-3" data-tilt data-tilt-max="10">
                <div class="card-body d-flex flex-column">
                    <i class="bi bi-grid-3x3-gap text-primary fs-1 mb-3"></i>
                    <h5 class="card-title">Тепловые карты</h5>
                    <p class="card-text small text-muted">Анализ взаимосвязей валютных пар</p>
                    <a href="/heatmap/" class="btn btn-primary mt-auto">Перейти</a>
                </div>
            </div>
        </div> 
        <div class="col-md-4 col-sm-6">
            <div class="card h-100 menu-card shadow border text-center p-3" data-tilt data-tilt-max="10">
                <div class="card-body d-flex flex-column">
                    <i class="bi bi-graph-up text-primary fs-1 mb-3"></i>
                    <h5 class="card-title">Динамика курсов</h5>
                    <p class="card-text small text-muted">Распределение данных во времени</p>
                    <a href="/trends/" class="btn btn-primary mt-auto">Перейти</a>
                </div>
            </div>
        </div> 
        <div class="col-md-4 col-sm-6">
            <div class="card h-100 menu-card shadow border text-center p-3" data-tilt data-tilt-max="10">
                <div class="card-body d-flex flex-column">
                    <i class="bi bi-calculator text-primary fs-1 mb-3"></i>
                    <h5 class="card-title">Регрессия</h5>
                    <p class="card-text small text-muted">Математическое моделирование</p>
                    <a href="/regressions/" class="btn btn-primary mt-auto">Перейти</a>
                </div>
            </div>
        </div>         
    </div>
</div>
{% endblock %}
